<!DOCTYPE html>
<html lang="en">
<head>
  <title>Halaman Gambar</title>
  <link rel="icon" type="img/png" href="gambar/pnm.png" sizes="16x16" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Dinda Aulia">
  <meta name="nim" content="253307011">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
    }
    header {
      background-color: #666;
      padding: 30px;
      text-align: center;
      font-size: 35px;
      color: white;
    }
    nav {
      float: left;
      width: 30%;
      background: #ccc;
      padding: 20px;
      min-height: 300px;
    }
    nav ul {
      list-style-type: none;
      padding: 0;
    }
    nav ul li a {
      text-decoration: underline;
      color: #0000EE;
    }
    article {
      float: left;
      padding: 20px;
      width: 70%;
      background-color: #f1f1f1;
      min-height: 300px;
    }
    section::after {
      content: "";
      display: table;
      clear: both;
    }
    footer {
      background-color: #777;
      padding: 10px;
      text-align: center;
      color: white;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-top: 10px;
    }
    .gallery img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border: 1px solid #ccc;
    }
    @media (max-width: 600px) {
      nav, article {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <h2>Website Gambar</h2>
  </header>

  <section>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="gambar.html">Gambar</a></li>
        <li><a href="event.html">Event</a></li>
        <li><a href="audio.html">Audio</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="svg.html">SVG</a></li>
        <li><a href="canvas.html">Canvas</a></li>
      </ul>
    </nav>

    <article>
      <h1>Gambar Pemandangan</h1>
      <div class="gallery">
        <img src="gambar/pemandangan1.jpg" alt="Pemandangan 1">
        <img src="gambar/pemandangan2.jpg" alt="Pemandangan 2">
        <img src="gambar/pemandangan3.jpg" alt="Pemandangan 3">
        <img src="gambar/pemandangan4.jpg" alt="Pemandangan 4">
        <img src="gambar/pemandangan5.jpg" alt="Pemandangan 5">
        <img src="gambar/pemandangan6.jpg" alt="Pemandangan 6">
      </div>
    </article>
  </section>

  <footer>
    <p>Footer &copy; 2026 - Praktikum HTML5 - Dinda Aulia</p>
  </footer>
