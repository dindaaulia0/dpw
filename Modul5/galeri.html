<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto - CSS Flexbox</title>
    <link rel="icon" type="img/png" href="gambar/pnm.png" sizes="16x16" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            color: #e0e0e0;
            letter-spacing: 2px;
        }

        p.info {
            text-align: center;
            color: #aaa;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .galeri {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .galeri-item {
            width: 110px;
            height: 110px;
            overflow: hidden;
            border-radius: 10px;
            border: 3px solid #444;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #2c2c3e;
        }

        .galeri-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border-color: #e91e8c;
        }

        .galeri-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .galeri-item .caption {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.55);
            color: white;
            text-align: center;
            padding: 4px;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .galeri-item:hover .caption {
            opacity: 1;
        }

        .info-grid {
            text-align: center;
            color: #ccc;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .info-grid code {
            background: #2c2c3e;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>🖼️ Galeri Foto CSS Flexbox</h1>
<p class="info">18 item foto &bull; Dimensi 110px × 110px &bull; CSS Flexbox Layout</p>
