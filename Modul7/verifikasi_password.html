<HTML>
<HEAD>
  <TITLE>Program Verifikasi Password</TITLE>
  <LINK rel="icon" type="img/png" href="gambar/pnm.png" sizes="16x16" />
  <LINK rel="stylesheet" href="style.css">
</HEAD>
<BODY>
  <DIV class="kotak">
    <H2>Program Verifikasi Password</H2>

    <FORM NAME="formTes" ACTION="tesform.htm" METHOD="POST">
      <P>
        Password Pengganti &nbsp;&nbsp;:
        <INPUT TYPE="PASSWORD" NAME="password_1"><BR><BR>
        Password Sekali Lagi :
        <INPUT TYPE="PASSWORD" NAME="password_2"><BR><BR>
        <INPUT TYPE="BUTTON" NAME="tombolProses" VALUE="Proses"
               onClick="cekPassword()">
      </P>
    </FORM>

    <P><A href="index.html">← Kembali</A></P>
  </DIV>

  <SCRIPT LANGUAGE="JavaScript">
    function cekPassword() {
      if (document.formTes.password_1.value !=
          document.formTes.password_2.value)
        alert("Dua password yang Anda masukkan tidak sama");
      else
        alert("Password cocok!");
    }
  </SCRIPT>
</BODY>
</HTML>
