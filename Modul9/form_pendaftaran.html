<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 650px;
        margin: 40px auto;
        padding: 20px;
        background: #f5f5f5;
    }

    h2 {
        color: #333;
        border-bottom: 2px solid #4CAF50;
        padding-bottom: 10px;
    }

    .form-group {
        margin-bottom: 15px;
        display: flex;
        align-items: center;
    }

    label {
        width: 180px;
        font-weight: bold;
        color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    textarea {
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    input[type="text"],
    input[type="email"] {
        width: 250px;
    }

    .ttl {
        display: flex;
        gap: 10px;
    }

    .ttl input[type="text"] {
        width: 150px;
    }

    .ttl input[type="date"] {
        width: 170px;
    }

    input[type="submit"] {
        background: #4CAF50;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }

    input[type="submit"]:hover {
        background: #45a049;
    }
</style>
</head>
<body>
    <h2>Form Pendaftaran</h2>
    <form method="POST" action="proses_pendaftaran.php">
        <div class="form-group">
            <label>Nim:</label>
            <input type="text" name="nim" placeholder="nim">
        </div>
        
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" name="nama" placeholder="nama">
        </div>

        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" name="email" placeholder="email">
        </div>

        <div class="form-group">
            <label>Tempat, Tanggal Lahir:</label>
            <div class="ttl">
                <input type="text" name="tempat" placeholder="tempat">
                <input type="date" name="tanggal_lahir">
            </div>
        </div>

        <div class="form-group">
            <label>Alamat:</label>
            <input type="text" name="alamat" placeholder="alamat">
        </div>

        <div class="form-group">
            <label>Gender:</label>
            <input type="radio" name="gender" value="Laki-Laki"> Laki-Laki
            <input type="radio" name="gender" value="Perempuan" checked> Perempuan
        </div>

        <div class="form-group">
            <input type="submit" name="kirim" value="kirim">
        </div>
    </form>
</body>
</html>
